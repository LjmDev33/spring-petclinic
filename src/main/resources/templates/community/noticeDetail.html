<!-- 공지사항 상세 템플릿 (layout.html에 삽입되는 프래그먼트) -->
<div xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- 아코디언 애니메이션 CSS -->
<style>
  /* 아코디언 헤더 */
  .accordion-header {
    user-select: none;
    border-radius: 0;
  }

  .accordion-header:hover {
    background-color: #e9ecef !important;
    }

    /* 아코디언 토글 아이콘 (화살표) 회전 애니메이션 */
    .accordion-toggle-icon i {
      display: inline-block;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: rotate(180deg); /* 초기 상태: 화살표 위 방향 (닫힘 상태) */
    }

    /* 아코디언 본문 */
    .accordion-body {
      padding: 1.5rem;
    }

    /* 패널 높이 변경 애니메이션 (부드럽게) */
    .collapse {
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      /*overflow: hidden; !* 애니메이션 중 내용 숨김 *! 상단바 메뉴 또한 hidden으로 바뀜, 좋아요/댓글 요소에도 적용되는 스타일 없는 것으로 보아 주석처리 */
    }

    .collapse.show {
      overflow: visible; /* 열린 후 내용 표시 */
    }

    /* 스크롤 동작 부드럽게 */
    html {
      scroll-behavior: smooth;
    }

    /* 아코디언 헤더 폰트 */
    .accordion-header .fw-bold {
      font-weight: 600;
      color: #212529;
    }
</style>

<div class="container mt-4">
  <div class="container-fluid px-0">
    <div class="row">
      <div class="col-12 d-md-flex justify-content-end px-0 gap-2">
        <!-- 관리자 전용 수정 버튼 -->
        <a sec:authorize="hasRole('ROLE_ADMIN')" class="btn btn-warning"
           th:href="@{/community/edit/{id}(id=${post.id},subject=${subject})}">
          <i class="bi bi-pencil"></i> 수정
        </a>
        <button class="btn btn-light">인쇄</button>
        <button class="btn btn-light">스크랩</button>
        <a class="btn btn-light" th:href="@{/community/list(subject=${subject})}">
          목록보기
        </a>
      </div>
    </div>

    <div class="row">
      <hr class="mt-md-2 border-2 opacity-25"/>
      <h1><span th:text="${post.title}"></span></h1>
      <hr class="mt-md-2 border-1 opacity-25"/>
      <div class="d-md-flex gap-4">
        <h3 class="mb-0">작성자 : <span class="opacity-75" th:text="${post.author}"></span></h3>
        <h3 class="mb-0">작성일 : <span class="opacity-75" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span></h3>
        <h3 class="mb-0">조회 : <span class="opacity-75" th:text="${post.viewCount != null ? post.viewCount : 0}"></span></h3>
      </div>
    </div>

    <div class="row mt-md-2">
      <table class="table table-bordered">
        <tbody>
          <tr>
            <td class="p-4" style="min-height: 250px; max-height: 500px; overflow-y: auto;">
              <div th:utext="${post.content}"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 첨부파일 표시 -->
    <div class="row mt-3" th:if="${post.attachmentDtos != null and !post.attachmentDtos.isEmpty()}">
      <div class="col-12">
        <h5><i class="bi bi-paperclip"></i> 첨부파일</h5>
        <ul class="list-group">
          <li class="list-group-item d-flex justify-content-between align-items-center" th:each="file : ${post.attachmentDtos}">
            <a th:href="@{/community/download/{fileId}(fileId=${file.id})}" th:text="${file.originalFileName}"></a>
            <span class="badge bg-secondary rounded-pill" th:text="${#numbers.formatDecimal(file.fileSize / 1024, 1, 2)} + ' KB'"></span>
          </li>
        </ul>
      </div>
    </div>
    
    <!-- 좋아요 탭 헤더 + 패널 영역 (공지사항은 답변 없음) -->
    <div class="row mt-5">
      <div class="col-12">
        <!-- 탭 헤더 (콘텐츠 크기에 맞게 왼쪽 정렬) -->
        <div class="border rounded-top" id="tabContainer" style="background-color: #f8f9fa; display: inline-flex; position: relative; z-index: 1;">

          <!-- 좋아요 헤더 -->
          <div class="accordion-header d-flex align-items-center p-3"
               id="likeAccordionHeader"
               style="cursor: pointer; transition: background-color 0.3s ease; min-width: 150px; gap: 8px;"
               aria-expanded="false" aria-controls="likeAccordionPanel">

            <!-- 좋아요 하트 아이콘 (클릭 시 토글) -->
            <span id="likeButton" style="cursor: pointer; font-size: 1.2rem;"
                  onclick="toggleLike(event)"
                  title="좋아요를 누르려면 로그인하세요">
              <i id="likeIcon" th:class="${isLiked} ? 'fa fa-heart text-danger' : 'fa fa-heart-o'"></i>
            </span>

            <!-- 텍스트 -->
            <span class="fw-bold">좋아요 (<span id="likeCountTab" th:text="${likeCount}">0</span>)</span>

            <!-- 아코디언 화살표 (오른쪽 끝) -->
            <span class="accordion-toggle-icon" style="display: inline-flex; align-items: center; transition: transform 0.3s ease; margin-left: auto;">
              <i class="fa fa-chevron-down"></i>
            </span>
          </div>
        </div>

        <!-- 좋아요 패널 -->
        <div class="collapse border border-top-0 rounded-bottom" id="likeAccordionPanel"
             style="transition: max-height 0.3s ease;">
          <div class="accordion-body p-4 bg-light">
              <!-- 비로그인 사용자 안내 -->
              <div sec:authorize="!isAuthenticated()" class="alert alert-info text-center mb-4">
                <i class="fa fa-info-circle me-2"></i>좋아요를 누르려면 로그인이 필요합니다.
              </div>

              <!-- 좋아요 누른 사용자 목록 -->
            <div id="likedUsersContainer">
              <div th:if="${likedUsers != null and !likedUsers.isEmpty()}">
                <h5 class="mb-3 fw-bold text-center">📌 이 글에 공감한 사용자</h5>
                <div class="row g-2">
                  <!-- 한 줄에 4명씩 배치 -->
                  <div th:each="user : ${likedUsers}" class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="d-flex align-items-center p-2 border rounded bg-light">
                      <!-- 프로필 이미지 또는 이니셜 아바타 -->
                      <div th:if="${user.hasProfileImage()}"
                           class="rounded-circle me-2 flex-shrink-0"
                           th:style="'width: 36px; height: 36px; background-image: url(' + ${user.profileImageUrl} + '); background-size: cover; background-position: center;'">
                      </div>
                      <div th:unless="${user.hasProfileImage()}"
                           class="rounded-circle me-2 flex-shrink-0 d-flex align-items-center justify-content-center text-white fw-bold"
                           th:style="'width: 36px; height: 36px; background-color: ' + ${user.avatarColor} + '; font-size: 14px;'"
                           th:text="${user.initial}">
                      </div>
                      <!-- 닉네임 -->
                      <span class="fw-bold text-truncate" th:text="${user.nickname}" th:title="${user.nickname}">사용자</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

              <!-- 좋아요 없을 때 안내 -->
              <div th:if="${likedUsers == null or likedUsers.isEmpty()}" class="alert alert-light text-center">
                <i class="fa fa-heart-o me-2"></i>아직 좋아요를 누른 사용자가 없습니다.
              </div>
          </div> <!-- /accordion-body -->
        </div> <!-- /likeAccordionPanel -->

      </div> <!-- /col-12 -->
    </div> <!-- /row -->

    <!-- 이전글/다음글 -->
    <div class="row mt-md-4">
        <p>
          <span class="border-2 me-3 fs-6">이전글 ▲ </span>
          <span class="border-2 me-3 opacity-50">|</span>
          <span th:if="${prevPost != null}">
            <a th:href="@{/community/detail/{id}(id=${prevPost.id} , subject = ${subject})}"
               th:text="${prevPost.title}"></a>
          </span>
          <span th:if="${prevPost==null}" class="opacity-50">이전글이 없습니다.</span>
        </p>
        <hr class="mt-md-2 border-1 opacity-25"/>
        <p>
          <span class="border-2 me-3">다음글 ▼ </span>
          <span class="border-2 me-3 opacity-50">|</span>
          <span th:if="${nextPost != null}">
          <a th:href="@{/community/detail/{id}(id=${nextPost.id} , subject = ${subject})}"
            th:text="${nextPost.title}"></a>
          </span>
          <span th:if="${nextPost == null}" class="opacity-50">다음글이 없습니다</span>
        </p>
        <hr class="mt-md-2 border-1 opacity-25"/>
    </div>
  </div>

</div>

<!-- 오류 알림 시스템 JS -->
<script th:src="@{/js/error-notification.js}"></script>

<script th:inline="javascript">
  /**
   * 페이지 로드 후 이벤트 리스너 등록
   */
  document.addEventListener('DOMContentLoaded', function() {
    // === 아코디언 패널 초기 상태 강제 설정 ===
    const likePanel = document.getElementById('likeAccordionPanel');
    const likeHeader = document.getElementById('likeAccordionHeader');

    // 좋아요 패널: 닫힘 상태 강제 설정
    if (likePanel) {
      likePanel.classList.remove('show');
      likePanel.style.height = '';
    }

    // 화살표 초기 방향 강제 설정
    // 좋아요: 닫힘 → 위 방향 (180deg)
    if (likeHeader) {
      const likeIcon = likeHeader.querySelector('.accordion-toggle-icon i');
      if (likeIcon) {
        likeIcon.style.transform = 'rotate(180deg)'; // 위 방향
      }
    }
  });

  /**
   * 좋아요 토글 (AJAX) - Community 버전
   * - 로그인한 사용자만 가능
   * - 하트 아이콘 및 개수 업데이트
   * - 아코디언 펼침/접힘과 독립적으로 동작
   */
  function toggleLike(event) {
    // 이벤트 전파 방지 (아코디언 토글과 독립)
    if (event) {
      event.stopPropagation();
      event.preventDefault();
    }

    const postId = /*[[${post.id}]]*/ '';
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    fetch('/community/detail/' + postId + '/like', {
      method: 'POST',
      headers: {
        [csrfHeader]: csrfToken,
        'Content-Type': 'application/json'
      }
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        // 탭의 하트 아이콘 업데이트
        const likeIcon = document.getElementById('likeIcon');
        if (data.liked) {
          // 좋아요 추가됨 (빨간 하트)
          likeIcon.className = 'fa fa-heart text-danger';
        } else {
          // 좋아요 취소됨 (빈 하트)
          likeIcon.className = 'fa fa-heart-o';
        }

        // 좋아요 개수 업데이트 (탭만)
        document.getElementById('likeCountTab').textContent = data.likeCount;

        // [추가] 목록 실시간 업데이트
        updateLikedUsersList(data.likedUsers);

        // Toast 알림
        TOAST.showSuccess(data.message, 2000);
      } else {
        // 에러 (비로그인 등)
        TOAST.showError(data.error, 3000);
      }
    })
    .catch(error => {
      console.error('Like toggle error:', error);
      TOAST.showError('좋아요 처리 중 오류가 발생했습니다.', 3000);
    });
  }

  /**
   * [추가] 사용자 목록 DOM 재구성 함수 (Photo와 로직 동일)
   */
  function updateLikedUsersList(users) {
    const container = document.getElementById('likedUsersContainer');
    if (!container) return;

    if (!users || users.length === 0) {
      container.innerHTML = `
        <div class="alert alert-light text-center">
          <i class="fa fa-heart-o me-2"></i>아직 좋아요를 누른 사용자가 없습니다.
        </div>
      `;
      return;
    }

    let html = `
      <h5 class="mb-3 fw-bold text-center">📌 이 글에 공감한 사용자</h5>
      <div class="row g-2">
    `;

    users.forEach(user => {
      let profileHtml = '';
      if (user.hasProfileImage) {
        profileHtml = `<div class="rounded-circle me-2 flex-shrink-0"
             style="width: 36px; height: 36px; background-image: url('${user.profileImageUrl}'); background-size: cover; background-position: center;">
        </div>`;
      } else {
        profileHtml = `<div class="rounded-circle me-2 flex-shrink-0 d-flex align-items-center justify-content-center text-white fw-bold"
             style="width: 36px; height: 36px; background-color: ${user.avatarColor}; font-size: 14px;">
             ${user.initial}
        </div>`;
      }

      html += `
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
          <div class="d-flex align-items-center p-2 border rounded bg-light">
            ${profileHtml}
            <span class="fw-bold text-truncate" title="${user.nickname}">${user.nickname}</span>
          </div>
        </div>
      `;
    });

    html += `</div>`;
    container.innerHTML = html;
  }

  /**
   * 아코디언 동작 + 화살표 회전 애니메이션
   * - 스크롤 위치 유지 (페이지 점프 방지)
   */
  (function initAccordionBehavior() {
    const likePanel = document.getElementById('likeAccordionPanel');
    const likeHeader = document.getElementById('likeAccordionHeader');
    const likeToggleIcon = likeHeader.querySelector('.accordion-toggle-icon i');

    // === 헤더 클릭 시 스크롤 방지 + 수동 토글 ===
    likeHeader.addEventListener('click', function(e) {
      e.preventDefault(); // 기본 동작 방지 (스크롤 점프 방지)
      const likeCollapse = bootstrap.Collapse.getOrCreateInstance(likePanel);
      likeCollapse.toggle(); // 수동 토글
    });

    // === 좋아요 패널 이벤트 ===
    likePanel.addEventListener('show.bs.collapse', function() {
      // 좋아요 패널 열기 → 화살표 아래 방향 (0deg)
      if (likeToggleIcon) {
        likeToggleIcon.style.transform = 'rotate(0deg)';
      }
    });

    likePanel.addEventListener('hide.bs.collapse', function() {
      // 좋아요 패널 닫기 → 화살표 위 방향 (180deg)
      if (likeToggleIcon) {
        likeToggleIcon.style.transform = 'rotate(180deg)';
      }
    });

    // === 헤더 호버 효과 ===
    likeHeader.addEventListener('mouseenter', function() {
      this.style.backgroundColor = '#e9ecef';
    });
    likeHeader.addEventListener('mouseleave', function() {
      this.style.backgroundColor = '#f8f9fa';
    });
  })();
</script>

</div> <!-- /wrapper div -->
